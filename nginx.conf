# ── Redirection HTTP → HTTPS ──────────────────────────────────────────────────
server {
    listen 80;
    server_name enimconnect.duckdns.org;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name enimconnect.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/enimconnect.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enimconnect.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Backend API ───────────────────────────────────────────────────────────
    location ~ ^/(auth|etudiants|annonces|entreprises|club|notifications|decision|valider-dept|rejeter-form|rejeter-dept|api|storage|health|docs|openapi\.json|redoc)(/|$) {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    # ── N8n Webhooks ─────────────────────────────────────────────────────────
    location /webhook/ {
        proxy_pass         http://n8n:5678;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Frontend SPA (React) ──────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
